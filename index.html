<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contrôle Rayon Froid</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #14213d;
      padding: 16px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      border: 1px solid #dbe3ef;
    }

    h1 {
      font-size: 30px;
      line-height: 1.1;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .subtitle {
      color: #6b7280;
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .block-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .input {
      width: 100%;
      height: 84px;
      border-radius: 22px;
      border: 2px solid #d4dbe6;
      outline: none;
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      color: #1f2937;
      background: #fafbfd;
      margin-bottom: 16px;
      padding: 0 16px;
    }

    .input:focus {
      border-color: #2563eb;
      background: #fff;
    }

    .result-box {
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .result-empty {
      color: #94a3b8;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
    }

    .product-title {
      font-size: 15px;
      color: #64748b;
      font-weight: 700;
    }

    .product-code {
      font-size: 28px;
      font-weight: 900;
      color: #111827;
    }

    .product-ref {
      font-size: 20px;
      font-weight: 800;
      color: #2563eb;
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 20px;
      padding: 20px 16px;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:active {
      transform: scale(0.99);
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: white;
    }

    .btn-disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .info-line {
      margin-top: 18px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: #475569;
    }

    .status {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      display: none;
    }

    .status.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .status.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .list-section {
      margin-top: 18px;
      background: #f8fafc;
      border: 1px solid #dbe3ef;
      border-radius: 20px;
      padding: 16px;
    }

    .list-section h2 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .validated-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .validated-item {
      background: white;
      border: 1px solid #dbe3ef;
      border-radius: 14px;
      padding: 12px;
    }

    .validated-item .small {
      color: #64748b;
      font-size: 13px;
      font-weight: 700;
    }

    .validated-item .big {
      color: #111827;
      font-size: 18px;
      font-weight: 900;
      margin-top: 4px;
    }

    .validated-item .ref {
      color: #2563eb;
      font-size: 16px;
      font-weight: 800;
      margin-top: 4px;
      word-break: break-word;
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 24px;
      }

      .subtitle {
        font-size: 16px;
      }

      .input {
        height: 76px;
        font-size: 24px;
      }

      .product-code {
        font-size: 24px;
      }

      .product-ref {
        font-size: 18px;
      }

      button {
        font-size: 21px;
        padding: 18px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Contrôle rayon froid</h1>
      <p class="subtitle">
        Tape le code boule. Le meilleur résultat s’affiche automatiquement.
      </p>

      <div class="block-title">Saisie du code boule</div>
      <input
        id="codeInput"
        class="input"
        type="text"
        inputmode="numeric"
        placeholder="Code boule"
        autocomplete="off"
      />

      <div id="resultBox" class="result-box">
        <div class="result-empty">Aucun produit sélectionné</div>
      </div>

      <div class="actions">
        <button id="validateBtn" class="btn-primary btn-disabled" disabled>
          Valider le produit
        </button>
        <button id="finishBtn" class="btn-secondary">
          Valider le contrôle
        </button>
      </div>

      <div class="info-line">
        Produits validés : <span id="validatedCount">0</span> / <span id="totalCount">0</span>
      </div>

      <div id="status" class="status"></div>

      <div class="list-section">
        <h2>Produits validés</h2>
        <div id="validatedList" class="validated-list">
          <div class="result-empty">Aucun produit validé pour le moment</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PRODUCTS = [
      { title: "Réfrigérateur - Ref combiné - Combi ventilé", code: "1211543", ref: "LG GBV3110EPY" },
      { title: "Réfrigérateur - Ref combiné - Combi ventilé", code: "1211785", ref: "HISENSE RB39CN48CC" },
      { title: "Réfrigérateur - Ref combiné - Combi ventilé", code: "1100651", ref: "SAMSUNG RB38C600DSA" },
      { title: "Réfrigérateur - Ref combiné - Combi ventilé", code: "1201544", ref: "LG GB8728M9CQ1" },
      { title: "Réfrigérateur - Ref combiné - Combi ventilé", code: "1202836", ref: "BEKO B5RCNE3652XP" },
      { title: "Réfrigérateur - Ref combiné - Combi ventilé", code: "1201521", ref: "SAMSUNG RB500GB02ES9" },
      { title: "Réfrigérateur - Ref combiné - Combi ventilé", code: "1202534", ref: "SAMSUNG RB53DG703DS9" },

      { title: "Réfrigérateur - Ref américain - Side", code: "8010646", ref: "ESSENTIELB ERAVDE180-90hov5" },
      { title: "Réfrigérateur - Ref américain - Side", code: "1175284", ref: "SAMSUNG RH69B8940S9" },
      { title: "Réfrigérateur - Ref américain - Side", code: "1202581", ref: "SAMSUNG RH65DG54R3S9" },
      { title: "Réfrigérateur - Ref américain - Side", code: "1204221", ref: "LG GSXE90EVDD InstaView" },

      { title: "Réfrigérateur - Ref américain - Multi", code: "1200091", ref: "LG GMZ765SBHJ InstaView" },
      { title: "Réfrigérateur - Ref américain - Multi", code: "1201967", ref: "SAMSUNG RF24BB620EB1" },
      { title: "Réfrigérateur - Ref américain - Multi", code: "1203636", ref: "HISENSE RQ768N4GBE freshfit" },
      { title: "Réfrigérateur - Ref américain - Multi", code: "1204223", ref: "LG GMV960NNME MoodUp" },
      { title: "Réfrigérateur - Ref américain - Multi", code: "1202583", ref: "SAMSUNG RF65DG960ESR" },
      { title: "Réfrigérateur - Ref américain - Multi", code: "1213700", ref: "Lot LG erreur" },
      { title: "Réfrigérateur - Ref américain - Multi", code: "1213743", ref: "LG GMV960NNME MoodUp" },

      { title: "Mini Réfrigérateur", code: "8010888", ref: "ESSENTIELB ERM 65-45b5" },

      { title: "Réfrigérateur Top", code: "8010452", ref: "ESSENTIELB ERT85-55hob1" },
      { title: "Réfrigérateur Top", code: "8010481", ref: "ESSENTIELB ERT85-55mis1" },
      { title: "Réfrigérateur Top", code: "8011167", ref: "ESSENTIELB ERT85-55hcb6" },

      { title: "Réfrigérateur 1 porte", code: "1204124", ref: "LIEBHERR Rd5000-22" },

      { title: "Réfrigérateur 1 porte ventilé", code: "8011604", ref: "ESSENTIELB ERLV170-60h1" },
      { title: "Réfrigérateur 1 porte ventilé", code: "1201187", ref: "ESSENTIELB ERLV185-60h1" },

      { title: "Réfrigérateur 2 portes", code: "1191154", ref: "HISENSE RT161D4ADE" },

      { title: "Réfrigérateur 2 portes ventilé", code: "8308611", ref: "ESSENTIELB ERDV165-55s3" },
      { title: "Réfrigérateur 2 portes ventilé", code: "1208346", ref: "BEKO RDSK4054XBN" },
      { title: "Réfrigérateur 2 portes ventilé", code: "1204250", ref: "LG GTBV44EPBKD" },

      { title: "Réfrigérateur combiné statique", code: "8010745", ref: "LISTO RCL170-55minb2" },
      { title: "Réfrigérateur combiné statique", code: "8010748", ref: "LISTO RCL185-60hcb5" }
    ];

    const codeInput = document.getElementById("codeInput");
    const resultBox = document.getElementById("resultBox");
    const validateBtn = document.getElementById("validateBtn");
    const finishBtn = document.getElementById("finishBtn");
    const statusBox = document.getElementById("status");
    const validatedCount = document.getElementById("validatedCount");
    const totalCount = document.getElementById("totalCount");
    const validatedList = document.getElementById("validatedList");

    totalCount.textContent = PRODUCTS.length;

    let currentProduct = null;
    let validatedProducts = [];

    function normalize(str) {
      return String(str).toLowerCase().trim();
    }

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = "status " + type;
    }

    function clearStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function renderCurrentProduct(product) {
      if (!product) {
        resultBox.innerHTML = `<div class="result-empty">Aucun produit trouvé</div>`;
        validateBtn.disabled = true;
        validateBtn.classList.add("btn-disabled");
        return;
      }

      const alreadyValidated = validatedProducts.some(p => p.code === product.code);

      resultBox.innerHTML = `
        <div class="product-title">${product.title}</div>
        <div class="product-code">${product.code}</div>
        <div class="product-ref">${product.ref}</div>
      `;

      validateBtn.disabled = alreadyValidated;
      if (alreadyValidated) {
        validateBtn.classList.add("btn-disabled");
        showStatus("Ce produit est déjà validé.", "error");
      } else {
        validateBtn.classList.remove("btn-disabled");
      }
    }

    function findBestMatch(inputValue) {
      const value = normalize(inputValue).replace(/\D/g, "");

      if (!value) return null;

      let exact = PRODUCTS.find(p => p.code === value);
      if (exact) return exact;

      let startsWith = PRODUCTS.find(p => p.code.startsWith(value));
      if (startsWith) return startsWith;

      let includes = PRODUCTS.find(p => p.code.includes(value));
      if (includes) return includes;

      return null;
    }

    function renderValidatedList() {
      if (validatedProducts.length === 0) {
        validatedList.innerHTML = `<div class="result-empty">Aucun produit validé pour le moment</div>`;
        return;
      }

      validatedList.innerHTML = validatedProducts.map(product => `
        <div class="validated-item">
          <div class="small">${product.title}</div>
          <div class="big">${product.code}</div>
          <div class="ref">${product.ref}</div>
        </div>
      `).join("");
    }

    function updateCounters() {
      validatedCount.textContent = validatedProducts.length;
    }

    codeInput.addEventListener("input", () => {
      clearStatus();
      currentProduct = findBestMatch(codeInput.value);
      renderCurrentProduct(currentProduct);
    });

    validateBtn.addEventListener("click", () => {
      if (!currentProduct) {
        showStatus("Aucun produit sélectionné.", "error");
        return;
      }

      const alreadyValidated = validatedProducts.some(p => p.code === currentProduct.code);
      if (alreadyValidated) {
        showStatus("Ce produit est déjà validé.", "error");
        return;
      }

      validatedProducts.push(currentProduct);
      updateCounters();
      renderValidatedList();
      showStatus("Produit validé avec succès.", "success");

      codeInput.value = "";
      currentProduct = null;
      resultBox.innerHTML = `<div class="result-empty">Aucun produit sélectionné</div>`;
      validateBtn.disabled = true;
      validateBtn.classList.add("btn-disabled");
      codeInput.focus();
    });

    finishBtn.addEventListener("click", () => {
      const missingProducts = PRODUCTS.filter(
        product => !validatedProducts.some(v => v.code === product.code)
      );

      const reportWindow = window.open("", "_blank");

      if (!reportWindow) {
        showStatus("Impossible d’ouvrir le rapport. Vérifie si les pop-ups sont autorisées.", "error");
        return;
      }

      const reportHtml = `
        <!DOCTYPE html>
        <html lang="fr">
        <head>
          <meta charset="UTF-8" />
          <title>Rapport de contrôle</title>
          <style>
            body {
              font-family: Arial, sans-serif;
              padding: 24px;
              color: #111827;
            }
            h1 {
              font-size: 30px;
              margin-bottom: 8px;
            }
            .meta {
              margin-bottom: 24px;
              color: #475569;
              font-size: 16px;
              font-weight: 700;
            }
            .summary {
              display: grid;
              grid-template-columns: repeat(3, 1fr);
              gap: 12px;
              margin-bottom: 28px;
            }
            .box {
              border: 1px solid #dbe3ef;
              border-radius: 16px;
              padding: 16px;
              background: #f8fafc;
            }
            .box .label {
              color: #64748b;
              font-size: 14px;
              font-weight: 700;
            }
            .box .value {
              font-size: 30px;
              font-weight: 900;
              margin-top: 6px;
            }
            h2 {
              margin: 28px 0 14px;
              font-size: 22px;
            }
            .item {
              border: 1px solid #dbe3ef;
              border-radius: 14px;
              padding: 12px;
              margin-bottom: 10px;
              background: white;
            }
            .title {
              color: #64748b;
              font-size: 13px;
              font-weight: 700;
            }
            .code {
              font-size: 18px;
              font-weight: 900;
              margin-top: 4px;
            }
            .ref {
              font-size: 16px;
              font-weight: 800;
              color: #2563eb;
              margin-top: 4px;
              word-break: break-word;
            }
            .empty {
              color: #64748b;
              font-weight: 700;
              padding: 10px 0;
            }
            @media print {
              body {
                padding: 12px;
              }
            }
          </style>
        </head>
        <body>
          <h1>Rapport de contrôle</h1>
          <div class="meta">Date : ${new Date().toLocaleString("fr-FR")}</div>

          <div class="summary">
            <div class="box">
              <div class="label">Total listing</div>
              <div class="value">${PRODUCTS.length}</div>
            </div>
            <div class="box">
              <div class="label">Présents en rayon</div>
              <div class="value">${validatedProducts.length}</div>
            </div>
            <div class="box">
              <div class="label">Pas présents en rayon</div>
              <div class="value">${missingProducts.length}</div>
            </div>
          </div>

          <h2>Produits présents en rayon</h2>
          ${
            validatedProducts.length
              ? validatedProducts.map(product => `
                <div class="item">
                  <div class="title">${product.title}</div>
                  <div class="code">${product.code}</div>
                  <div class="ref">${product.ref}</div>
                </div>
              `).join("")
              : `<div class="empty">Aucun produit validé.</div>`
          }

          <h2>Produits pas présents en rayon</h2>
          ${
            missingProducts.length
              ? missingProducts.map(product => `
                <div class="item">
                  <div class="title">${product.title}</div>
                  <div class="code">${product.code}</div>
                  <div class="ref">${product.ref}</div>
                </div>
              `).join("")
              : `<div class="empty">Aucun produit manquant.</div>`
          }
        </body>
        </html>
      `;

      reportWindow.document.open();
      reportWindow.document.write(reportHtml);
      reportWindow.document.close();
    });

    renderValidatedList();
  </script>
</body>
</html>
